<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a8c3f;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3d7a35;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="80" x2="600" y2="80" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="320" x2="600" y2="320" stroke="#94a3b8" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="400" stroke="#94a3b8" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#94a3b8" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="400" stroke="#94a3b8" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- Wordle Grid - Row 1: CRANE (mixed feedback) -->
  <g transform="translate(50, 68)">
    <!-- C - gray -->
    <rect x="0" y="0" width="56" height="56" rx="4" fill="#787c7e"/>
    <text x="28" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">C</text>
    <!-- R - yellow -->
    <rect x="63" y="0" width="56" height="56" rx="4" fill="#c9b458"/>
    <text x="91" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">R</text>
    <!-- A - green -->
    <rect x="126" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="154" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">A</text>
    <!-- N - gray -->
    <rect x="189" y="0" width="56" height="56" rx="4" fill="#787c7e"/>
    <text x="217" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">N</text>
    <!-- E - yellow -->
    <rect x="252" y="0" width="56" height="56" rx="4" fill="#c9b458"/>
    <text x="280" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">E</text>
  </g>

  <!-- Row 2: STARE -->
  <g transform="translate(50, 134)">
    <rect x="0" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="28" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">S</text>
    <rect x="63" y="0" width="56" height="56" rx="4" fill="#787c7e"/>
    <text x="91" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">T</text>
    <rect x="126" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="154" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">A</text>
    <rect x="189" y="0" width="56" height="56" rx="4" fill="#c9b458"/>
    <text x="217" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">R</text>
    <rect x="252" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="280" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">E</text>
  </g>

  <!-- Row 3: SHARE (all green - solved!) -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="28" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">S</text>
    <rect x="63" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="91" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">H</text>
    <rect x="126" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="154" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">A</text>
    <rect x="189" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="217" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">R</text>
    <rect x="252" y="0" width="56" height="56" rx="4" fill="#6aaa64"/>
    <text x="280" y="37" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">E</text>
  </g>

  <!-- Empty row (remaining guesses) -->
  <g transform="translate(50, 266)" opacity="0.5">
    <rect x="0" y="0" width="56" height="56" rx="4" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="63" y="0" width="56" height="56" rx="4" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="126" y="0" width="56" height="56" rx="4" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="189" y="0" width="56" height="56" rx="4" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="252" y="0" width="56" height="56" rx="4" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  </g>

  <!-- AI Brain / Circuit icon on the right side -->
  <g transform="translate(420, 65)">
    <!-- Brain outline -->
    <g>
      <!-- Brain shape using paths -->
      <ellipse cx="75" cy="75" rx="65" ry="70" fill="none" stroke="url(#brainGrad)" stroke-width="2.5" opacity="0.85"/>

      <!-- Brain folds -->
      <path d="M 75 15 C 75 15, 48 32, 48 58 C 48 80, 59 91, 75 91" fill="none" stroke="#4a8c3f" stroke-width="1.8" opacity="0.5"/>
      <path d="M 75 15 C 75 15, 102 32, 102 58 C 102 80, 91 91, 75 91" fill="none" stroke="#4a8c3f" stroke-width="1.8" opacity="0.5"/>
      <path d="M 36 58 C 36 58, 58 53, 75 58 C 92 63, 114 58, 114 58" fill="none" stroke="#4a8c3f" stroke-width="1.5" opacity="0.4"/>

      <!-- Neural network nodes -->
      <circle cx="53" cy="48" r="5.5" fill="#4a8c3f" opacity="0.9"/>
      <circle cx="97" cy="48" r="5.5" fill="#b59f3b" opacity="0.9"/>
      <circle cx="75" cy="70" r="6.5" fill="#4a8c3f" opacity="0.9"/>
      <circle cx="58" cy="86" r="4.5" fill="#b59f3b" opacity="0.85"/>
      <circle cx="92" cy="86" r="4.5" fill="#4a8c3f" opacity="0.85"/>
      <circle cx="75" cy="37" r="4.5" fill="#b59f3b" opacity="0.85"/>

      <!-- Neural connections -->
      <line x1="53" y1="48" x2="75" y2="70" stroke="#4a8c3f" stroke-width="1.2" opacity="0.5"/>
      <line x1="97" y1="48" x2="75" y2="70" stroke="#b59f3b" stroke-width="1.2" opacity="0.5"/>
      <line x1="75" y1="70" x2="58" y2="86" stroke="#4a8c3f" stroke-width="1.2" opacity="0.5"/>
      <line x1="75" y1="70" x2="92" y2="86" stroke="#b59f3b" stroke-width="1.2" opacity="0.5"/>
      <line x1="53" y1="48" x2="75" y2="37" stroke="#b59f3b" stroke-width="1.2" opacity="0.5"/>
      <line x1="97" y1="48" x2="75" y2="37" stroke="#4a8c3f" stroke-width="1.2" opacity="0.5"/>
      <line x1="53" y1="48" x2="58" y2="86" stroke="#4a8c3f" stroke-width="0.8" opacity="0.35"/>
      <line x1="97" y1="48" x2="92" y2="86" stroke="#b59f3b" stroke-width="0.8" opacity="0.35"/>
    </g>
  </g>

  <!-- Connection arrows from brain to grid -->
  <g opacity="0.5">
    <path d="M 400 140 C 375 140, 355 140, 340 140" fill="none" stroke="#4a8c3f" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="340,137 330,140 340,143" fill="#4a8c3f"/>
  </g>

  <!-- Algorithm labels below brain -->
  <g transform="translate(425, 230)">
    <rect x="10" y="0" width="130" height="26" rx="13" fill="#6aaa64" opacity="0.15"/>
    <text x="75" y="17" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#3d7a35" font-weight="600">MCTS</text>

    <rect x="10" y="34" width="130" height="26" rx="13" fill="#c9b458" opacity="0.18"/>
    <text x="75" y="51" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#8a7a2a" font-weight="600">MINIMAX</text>

    <rect x="10" y="68" width="130" height="26" rx="13" fill="#6aaa64" opacity="0.15"/>
    <text x="75" y="85" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#3d7a35" font-weight="600">INFO THEORY</text>
  </g>

  <!-- Decorative corner accents -->
  <path d="M 0 12 L 0 0 L 12 0" fill="none" stroke="#4a8c3f" stroke-width="2" opacity="0.5" transform="translate(8,8)"/>
  <path d="M 0 -12 L 0 0 L -12 0" fill="none" stroke="#4a8c3f" stroke-width="2" opacity="0.5" transform="translate(592,392)"/>
</svg>