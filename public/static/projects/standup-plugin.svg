<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <filter id="termShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.4" stroke="#e2e8f0" stroke-width="0.5">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
  </g>

  <!-- Timeline line (horizontal, centered) -->
  <rect x="160" y="44" width="280" height="2.5" rx="1.25" fill="url(#accentLine)"/>

  <!-- Git commit dots on timeline -->
  <circle cx="185" cy="45" r="5.5" fill="#059669"/>
  <circle cx="235" cy="45" r="4.5" fill="#10b981"/>
  <circle cx="280" cy="45" r="5.5" fill="#0d9488"/>
  <circle cx="330" cy="45" r="4" fill="#0891b2"/>
  <circle cx="385" cy="45" r="5.5" fill="#0891b2"/>
  <circle cx="415" cy="45" r="3.5" fill="#06b6d4"/>

  <!-- Arrow from timeline down to hero card -->
  <path d="M 300 55 L 300 95" stroke="#0d9488" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <polygon points="296,93 304,93 300,101" fill="#0d9488" opacity="0.5"/>

  <!-- Hero summary card (enlarged, centered) -->
  <rect x="80" y="105" width="380" height="270" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Card accent top bar -->
  <rect x="80" y="105" width="380" height="4" rx="2" fill="url(#accentLine)"/>

  <!-- Card content: exec summary -->
  <text x="108" y="142" fill="#1e293b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600">Status Update</text>
  <text x="108" y="164" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10.5">Authentication refactored. Dark mode added.</text>

  <!-- Divider -->
  <line x1="108" y1="178" x2="430" y2="178" stroke="#e2e8f0" stroke-width="0.75"/>

  <!-- Bugs section -->
  <rect x="108" y="194" width="8" height="8" rx="2" fill="#dc2626"/>
  <text x="124" y="202" fill="#dc2626" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600">Bugs</text>
  <text x="108" y="220" fill="#4b5563" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10">- Fix login timeout on expired tokens</text>

  <!-- Features section -->
  <rect x="108" y="242" width="8" height="8" rx="2" fill="#059669"/>
  <text x="124" y="250" fill="#059669" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600">Features</text>
  <text x="108" y="268" fill="#4b5563" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10">- Add dark mode toggle to settings</text>
  <text x="108" y="284" fill="#4b5563" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10">- Implement user preference persistence</text>

  <!-- Refactors section -->
  <rect x="108" y="302" width="8" height="8" rx="2" fill="#0891b2"/>
  <text x="124" y="310" fill="#0891b2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600">Refactors</text>
  <text x="108" y="328" fill="#4b5563" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10">- Extract auth middleware into module</text>
  <text x="108" y="344" fill="#4b5563" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10">- Consolidate session parsing logic</text>

  <!-- Secondary terminal panel (smaller, offset to the right) -->
  <g opacity="0.8">
    <rect x="480" y="155" width="105" height="170" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.75" filter="url(#termShadow)"/>

    <!-- Terminal dots -->
    <circle cx="492" cy="167" r="2.5" fill="#ef4444"/>
    <circle cx="500" cy="167" r="2.5" fill="#f59e0b"/>
    <circle cx="508" cy="167" r="2.5" fill="#10b981"/>

    <!-- Terminal content -->
    <text x="490" y="188" fill="#0891b2" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="7">$</text>
    <text x="498" y="188" fill="#374151" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="7">/status-update</text>

    <text x="490" y="206" fill="#6b7280" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="6.5">Parsing...</text>

    <text x="490" y="222" fill="#059669" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="6.5">3 sessions</text>
    <text x="490" y="236" fill="#059669" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="6.5">7 work items</text>

    <!-- Separator -->
    <line x1="490" y1="246" x2="572" y2="246" stroke="#d1d5db" stroke-width="0.5"/>

    <text x="490" y="260" fill="#6b7280" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="6">classify + summarize</text>

    <!-- Check mark -->
    <text x="490" y="280" fill="#059669" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="8">Done</text>
    <polyline points="514,275 517,279 523,271" fill="none" stroke="#059669" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="490" y="296" fill="#6b7280" font-family="'SF Mono', Monaco, 'Cascadia Code', monospace" font-size="6">standup ready</text>
    <rect x="490" y="302" width="35" height="1.5" rx="0.75" fill="url(#accentLine)" opacity="0.6"/>
  </g>
</svg>