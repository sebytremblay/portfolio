<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b5ef7"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8345f8"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#08adc5"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="nodeGradEnd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0da472"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.5" stroke="#e2e8f0" stroke-width="0.5">
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
  </g>

  <!-- Connection edges (drawn first, behind nodes) -->

  <!-- Row 1: Parse Diff -> Fetch Files -->
  <line x1="168" y1="80" x2="228" y2="80" stroke="#4338ca" stroke-width="2" opacity="0.7"/>
  <polygon points="225,76 233,80 225,84" fill="#4338ca" opacity="0.7"/>

  <!-- Row 1: Fetch Files -> Gen Atoms -->
  <line x1="340" y1="80" x2="408" y2="80" stroke="#4338ca" stroke-width="2" opacity="0.7"/>
  <polygon points="405,76 413,80 405,84" fill="#4338ca" opacity="0.7"/>

  <!-- Row 1 to Row 2: Gen Atoms -> Annotate -->
  <path d="M 500 98 Q 500 145 430 145 Q 370 145 370 168" fill="none" stroke="#6d28d9" stroke-width="2" opacity="0.7"/>
  <polygon points="366,165 370,173 374,165" fill="#6d28d9" opacity="0.7"/>

  <!-- Row 2: Annotate -> Pre-Link -->
  <line x1="320" y1="195" x2="210" y2="195" stroke="#6d28d9" stroke-width="2" opacity="0.7"/>
  <polygon points="213,191 205,195 213,199" fill="#6d28d9" opacity="0.7"/>

  <!-- Row 2 to Row 3: Pre-Link -> Cluster -->
  <path d="M 120 218 Q 120 260 180 260 Q 220 260 220 283" fill="none" stroke="#0e7490" stroke-width="2" opacity="0.7"/>
  <polygon points="216,280 220,288 224,280" fill="#0e7490" opacity="0.7"/>

  <!-- Row 3: Cluster -> Validate -->
  <line x1="278" y1="310" x2="348" y2="310" stroke="#0e7490" stroke-width="2" opacity="0.7"/>
  <polygon points="345,306 353,310 345,314" fill="#0e7490" opacity="0.7"/>

  <!-- Row 3: Validate -> Cluster (retry loop) -->
  <path d="M 400 288 Q 400 260 340 260 Q 300 260 270 283" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
  <polygon points="273,280 267,286 275,287" fill="#d97706" opacity="0.5"/>
  <text x="350" y="256" font-family="monospace" font-size="9" fill="#b45309" opacity="0.7">retry</text>

  <!-- Row 3: Validate -> Build -->
  <line x1="440" y1="310" x2="488" y2="310" stroke="#047857" stroke-width="2" opacity="0.7"/>
  <polygon points="485,306 493,310 485,314" fill="#047857" opacity="0.7"/>

  <!-- Row 1 nodes (indigo) -->
  <!-- Node: Parse Diff -->
  <rect x="75" y="57" width="93" height="46" rx="9" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="121" y="84" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Parse Diff</text>

  <!-- Node: Fetch Files -->
  <rect x="233" y="57" width="107" height="46" rx="9" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="286" y="84" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Fetch Files</text>

  <!-- Node: Gen Atoms -->
  <rect x="413" y="57" width="105" height="46" rx="9" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="465" y="84" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Gen Atoms</text>

  <!-- Row 2 nodes (purple) -->
  <!-- Node: Annotate -->
  <rect x="320" y="172" width="100" height="46" rx="9" fill="url(#nodeGrad2)" filter="url(#shadow)"/>
  <text x="370" y="199" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Annotate</text>

  <!-- Node: Pre-Link -->
  <rect x="110" y="172" width="95" height="46" rx="9" fill="url(#nodeGrad2)" filter="url(#shadow)"/>
  <text x="157" y="199" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Pre-Link</text>

  <!-- Row 3 nodes (cyan + green terminal) -->
  <!-- Node: Cluster -->
  <rect x="178" y="287" width="100" height="46" rx="9" fill="url(#nodeGrad3)" filter="url(#shadow)"/>
  <text x="228" y="314" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Cluster</text>

  <!-- Node: Validate -->
  <rect x="353" y="287" width="90" height="46" rx="9" fill="url(#nodeGrad3)" filter="url(#shadow)"/>
  <text x="398" y="314" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Validate</text>

  <!-- Node: Build (terminal) -->
  <rect x="493" y="287" width="75" height="46" rx="9" fill="url(#nodeGradEnd)" filter="url(#shadow)"/>
  <text x="530" y="314" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Build</text>

  <!-- START indicator -->
  <circle cx="45" cy="80" r="10" fill="#4338ca" opacity="0.8" filter="url(#shadow)"/>
  <text x="45" y="84" font-family="monospace" font-size="7" fill="white" text-anchor="middle">S</text>
  <line x1="55" y1="80" x2="73" y2="80" stroke="#4338ca" stroke-width="2" opacity="0.7"/>
  <polygon points="70,76 78,80 70,84" fill="#4338ca" opacity="0.7"/>
</svg>