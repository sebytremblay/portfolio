  <circle cx="63" cy="71" r="5" fill="#eab308" opacity="0.8" />
  <circle cx="78" cy="71" r="5" fill="#22c55e" opacity="0.8" />
  <text x="155" y="75" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">changes.diff</text>

  <!-- Diff lines -->
  <g font-family="monospace" font-size="10">
    <!-- Line numbers -->
    <text x="40" y="108" fill="#9ca3b8" font-size="9">14</text>
    <text x="40" y="123" fill="#9ca3b8" font-size="9">15</text>
    <text x="40" y="138" fill="#9ca3b8" font-size="9">16</text>
    <text x="40" y="153" fill="#9ca3b8" font-size="9">17</text>
    <text x="40" y="168" fill="#9ca3b8" font-size="9">18</text>
    <text x="40" y="183" fill="#9ca3b8" font-size="9">19</text>
    <text x="40" y="198" fill="#9ca3b8" font-size="9">20</text>
    <text x="40" y="213" fill="#9ca3b8" font-size="9">21</text>
    <text x="40" y="228" fill="#9ca3b8" font-size="9">22</text>
    <text x="40" y="243" fill="#9ca3b8" font-size="9">23</text>
    <text x="40" y="258" fill="#9ca3b8" font-size="9">24</text>
    <text x="40" y="273" fill="#9ca3b8" font-size="9">25</text>
    <text x="40" y="288" fill="#9ca3b8" font-size="9">26</text>
    <text x="40" y="303" fill="#9ca3b8" font-size="9">27</text>
    <text x="40" y="318" fill="#9ca3b8" font-size="9">28</text>

    <!-- Context lines -->
    <text x="65" y="108" fill="#374151"> def extract(self):</text>
    <text x="65" y="123" fill="#374151">   signals = []</text>

    <!-- Removed lines -->
    <rect x="58" y="130" width="215" height="14" fill="#fef2f2" rx="2" />
    <text x="62" y="138" fill="#991b1b">-  for msg in self.raw:</text>
    <rect x="58" y="145" width="215" height="14" fill="#fef2f2" rx="2" />
    <text x="62" y="153" fill="#991b1b">-    if msg.get("type"):</text>

    <!-- Added lines -->
    <rect x="58" y="160" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="168" fill="#166534">+  for msg in transcript:</text>
    <rect x="58" y="175" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="183" fill="#166534">+    signal = classify(msg)</text>
    <rect x="58" y="190" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="198" fill="#166534">+    if signal is not None:</text>

    <!-- Context lines -->
    <text x="65" y="213" fill="#374151">     signals.append(s)</text>
    <text x="65" y="228" fill="#374151">   return signals</text>
    <text x="65" y="243" fill="#374151"></text>

    <!-- More additions -->
    <rect x="58" y="250" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="258" fill="#166534">+ def summarize(signals):</text>
    <rect x="58" y="265" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="273" fill="#166534">+   tradeoffs = filter(</text>
    <rect x="58" y="280" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="288" fill="#166534">+     is_tradeoff, signals)</text>

    <!-- Context -->
    <text x="65" y="303" fill="#374151"> </text>
    <text x="65" y="318" fill="#374151"> class Synthesizer:</text>
  </g>

  <!-- Insight panel (right side) -->
  <rect x="310" y="55" width="260" height="290" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1" />

