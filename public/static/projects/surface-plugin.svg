    <path d="M0 8 L6 2 L12 8 L18 4" stroke="url(#accent)" stroke-width="2" fill="none" stroke-linecap="round" />
  </g>
  <text x="350" y="75" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9" font-weight="600">Surface Insights</text>

  <!-- Insight card 1: Overview -->
  <rect x="322" y="100" width="236" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" />
  <rect x="322" y="106" width="3" height="40" rx="1.5" fill="#7c3aed" />
  <text x="334" y="117" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" font-weight="700">OVERVIEW</text>
  <text x="334" y="131" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Refactors signal extraction to use a</text>
  <text x="334" y="143" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">classifier pattern for cleaner parsing.</text>

  <!-- Insight card 2: Tradeoff -->
  <rect x="322" y="162" width="236" height="64" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" />
  <rect x="322" y="168" width="3" height="52" rx="1.5" fill="#d97706" />
  <g transform="translate(334, 176)">
    <path d="M0 0 L4 -6 L8 0 Z" fill="#d97706" opacity="0.8" />
    <line x1="4" y1="-4" x2="4" y2="-2" stroke="#f9fafb" stroke-width="1.5" />
    <circle cx="4" cy="0" r="0.5" fill="#f9fafb" />
  </g>
  <text x="348" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#d97706" font-weight="700">TRADEOFF</text>
  <text x="334" y="193" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Chose classifier over regex matching.</text>
  <text x="334" y="205" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Regex was faster but fragile against</text>
  <text x="334" y="217" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">evolving transcript formats.</text>

  <!-- Insight card 3: Review Focus -->
  <rect x="322" y="236" width="236" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" />
  <rect x="322" y="242" width="3" height="40" rx="1.5" fill="#2563eb" />
  <g transform="translate(336, 253)">
    <circle cx="5" cy="-2" r="5" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.8" />
    <line x1="9" y1="2" x2="12" y2="5" stroke="#2563eb" stroke-width="1.5" opacity="0.8" />
  </g>
  <text x="354" y="255" font-family="system-ui, sans-serif" font-size="10" fill="#2563eb" font-weight="700">REVIEW FOCUS</text>
  <text x="334" y="269" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Token estimation may undercount for</text>
  <text x="334" y="281" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">multi-byte characters (line 83).</text>

