    <line x1="0" y1="0" x2="0" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="40" y1="0" x2="40" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="80" y1="0" x2="80" y2="400" stroke="#94a3b8" stroke-width="1" />
