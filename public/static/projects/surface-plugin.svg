    <line x1="200" y1="0" x2="200" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="240" y1="0" x2="240" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="280" y1="0" x2="280" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="320" y1="0" x2="320" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="360" y1="0" x2="360" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="440" y1="0" x2="440" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="480" y1="0" x2="480" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="520" y1="0" x2="520" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="560" y1="0" x2="560" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="400" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="40" x2="600" y2="40" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="80" x2="600" y2="80" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="120" x2="600" y2="120" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="160" x2="600" y2="160" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="200" x2="600" y2="200" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="240" x2="600" y2="240" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="280" x2="600" y2="280" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="320" x2="600" y2="320" stroke="#94a3b8" stroke-width="1" />
    <line x1="0" y1="360" x2="600" y2="360" stroke="#94a3b8" stroke-width="1" />
  </g>

  <!-- Decorative orb top-right -->
  <circle cx="520" cy="60" r="80" fill="#7c3aed" opacity="0.04" />
  <circle cx="80" cy="340" r="60" fill="#3b82f6" opacity="0.03" />

  <!-- Diff panel (left side) -->
  <rect x="30" y="20" width="250" height="360" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1" />

  <!-- Diff panel title bar -->
  <rect x="30" y="20" width="250" height="32" rx="8" fill="#f3f4f6" />
  <rect x="30" y="40" width="250" height="12" fill="#f3f4f6" />
  <circle cx="48" cy="36" r="5" fill="#ef4444" opacity="0.8" />
  <circle cx="63" cy="36" r="5" fill="#eab308" opacity="0.8" />
  <circle cx="78" cy="36" r="5" fill="#22c55e" opacity="0.8" />
  <text x="155" y="40" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">changes.diff</text>

  <!-- Diff lines -->
  <g font-family="monospace" font-size="10">
    <!-- Line numbers -->
    <text x="40" y="78" fill="#9ca3b8" font-size="9">14</text>
    <text x="40" y="98" fill="#9ca3b8" font-size="9">15</text>
    <text x="40" y="118" fill="#9ca3b8" font-size="9">16</text>
    <text x="40" y="138" fill="#9ca3b8" font-size="9">17</text>
    <text x="40" y="158" fill="#9ca3b8" font-size="9">18</text>
    <text x="40" y="178" fill="#9ca3b8" font-size="9">19</text>
    <text x="40" y="198" fill="#9ca3b8" font-size="9">20</text>
    <text x="40" y="218" fill="#9ca3b8" font-size="9">21</text>
    <text x="40" y="238" fill="#9ca3b8" font-size="9">22</text>
    <text x="40" y="258" fill="#9ca3b8" font-size="9">23</text>
    <text x="40" y="278" fill="#9ca3b8" font-size="9">24</text>
    <text x="40" y="298" fill="#9ca3b8" font-size="9">25</text>
    <text x="40" y="318" fill="#9ca3b8" font-size="9">26</text>
    <text x="40" y="338" fill="#9ca3b8" font-size="9">27</text>
    <text x="40" y="358" fill="#9ca3b8" font-size="9">28</text>

    <!-- Context lines -->
    <text x="65" y="78" fill="#374151"> def extract(self):</text>
    <text x="65" y="98" fill="#374151">   signals = []</text>

    <!-- Removed lines -->
    <rect x="58" y="110" width="215" height="14" fill="#fef2f2" rx="2" />
    <text x="62" y="118" fill="#991b1b">-  for msg in self.raw:</text>
    <rect x="58" y="130" width="215" height="14" fill="#fef2f2" rx="2" />
    <text x="62" y="138" fill="#991b1b">-    if msg.get("type"):</text>

    <!-- Added lines -->
    <rect x="58" y="150" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="158" fill="#166534">+  for msg in transcript:</text>
    <rect x="58" y="170" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="178" fill="#166534">+    signal = classify(msg)</text>
    <rect x="58" y="190" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="198" fill="#166534">+    if signal is not None:</text>

    <!-- Context lines -->
    <text x="65" y="218" fill="#374151">     signals.append(s)</text>
    <text x="65" y="238" fill="#374151">   return signals</text>
    <text x="65" y="258" fill="#374151"></text>

    <!-- More additions -->
    <rect x="58" y="270" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="278" fill="#166534">+ def summarize(signals):</text>
    <rect x="58" y="290" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="298" fill="#166534">+   tradeoffs = filter(</text>
    <rect x="58" y="310" width="215" height="14" fill="#dcfce7" rx="2" />
    <text x="62" y="318" fill="#166534">+     is_tradeoff, signals)</text>

    <!-- Context -->
    <text x="65" y="338" fill="#374151"> </text>
    <text x="65" y="358" fill="#374151"> class Synthesizer:</text>
  </g>

  <!-- Insight panel (right side) -->
  <rect x="310" y="20" width="260" height="360" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1" />

  <!-- Insight panel title bar -->
  <rect x="310" y="20" width="260" height="32" rx="8" fill="#f3f4f6" />
  <rect x="310" y="40" width="260" height="12" fill="#f3f4f6" />

  <!-- Surface icon in title -->
  <g transform="translate(325, 28)">
    <path d="M0 8 L6 2 L12 8 L18 4" stroke="url(#accent)" stroke-width="2" fill="none" stroke-linecap="round" />
  </g>
  <text x="350" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9" font-weight="600">Surface Insights</text>

  <!-- Insight card 1: Overview -->
  <rect x="322" y="72" width="236" height="68" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" />
  <rect x="322" y="78" width="3" height="56" rx="1.5" fill="#7c3aed" />
  <text x="334" y="93" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" font-weight="700">OVERVIEW</text>
  <text x="334" y="110" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Refactors signal extraction to use a</text>
  <text x="334" y="124" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">classifier pattern for cleaner parsing.</text>

  <!-- Insight card 2: Tradeoff -->
  <rect x="322" y="156" width="236" height="82" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" />
  <rect x="322" y="162" width="3" height="70" rx="1.5" fill="#d97706" />
  <g transform="translate(334, 177)">
    <path d="M0 0 L4 -6 L8 0 Z" fill="#d97706" opacity="0.8" />
    <line x1="4" y1="-4" x2="4" y2="-2" stroke="#f9fafb" stroke-width="1.5" />
    <circle cx="4" cy="0" r="0.5" fill="#f9fafb" />
  </g>
  <text x="348" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#d97706" font-weight="700">TRADEOFF</text>
  <text x="334" y="197" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Chose classifier over regex matching.</text>
  <text x="334" y="211" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Regex was faster but fragile against</text>
  <text x="334" y="225" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">evolving transcript formats.</text>

  <!-- Insight card 3: Review Focus -->
  <rect x="322" y="254" width="236" height="68" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" />
  <rect x="322" y="260" width="3" height="56" rx="1.5" fill="#2563eb" />
  <g transform="translate(336, 277)">
    <circle cx="5" cy="-2" r="5" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.8" />
    <line x1="9" y1="2" x2="12" y2="5" stroke="#2563eb" stroke-width="1.5" opacity="0.8" />
  </g>
  <text x="354" y="279" font-family="system-ui, sans-serif" font-size="10" fill="#2563eb" font-weight="700">REVIEW FOCUS</text>
  <text x="334" y="296" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">Token estimation may undercount for</text>
  <text x="334" y="310" font-family="system-ui, sans-serif" font-size="9" fill="#4b5563">multi-byte characters (line 83).</text>

  <!-- Connection lines from diff to insights -->
  <g opacity="0.45">
    <line x1="273" y1="120" x2="322" y2="100" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" />
    <line x1="273" y1="178" x2="322" y2="197" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" />
    <line x1="273" y1="298" x2="322" y2="285" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" />
  </g>

  <!-- Connection dots -->
  <circle cx="273" cy="120" r="3" fill="#7c3aed" opacity="0.7" />
  <circle cx="273" cy="178" r="3" fill="#d97706" opacity="0.7" />
  <circle cx="273" cy="298" r="3" fill="#2563eb" opacity="0.7" />
</svg>