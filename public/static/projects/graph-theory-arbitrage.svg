<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Light gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="50%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>

    <!-- Arbitrage path gradient (darker green for light bg) -->
    <linearGradient id="arbPath" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="50%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>

    <!-- Node glow (amber tint on white) -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:0"/>
    </radialGradient>

    <!-- Green node glow for arbitrage nodes -->
    <radialGradient id="arbNodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0"/>
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Arrow marker for arbitrage path (slightly larger) -->
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#16a34a" opacity="0.9"/>
    </marker>

    <!-- Arrow marker for regular edges -->
    <marker id="arrowGold" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#b45309" opacity="0.4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#grid)" opacity="0.6"/>

  <!-- Ambient color spots (very subtle on light bg) -->
  <circle cx="150" cy="200" r="140" fill="#b45309" opacity="0.02"/>
  <circle cx="460" cy="240" r="160" fill="#16a34a" opacity="0.015"/>
  <circle cx="300" cy="120" r="120" fill="#6366f1" opacity="0.02"/>

  <!-- Graph group: recentered and scaled to fill viewport -->
  <g transform="translate(300, 200) scale(1.18) translate(-300, -188)">

    <!-- === COMMUNITY ELLIPSES (subtle, behind everything) === -->
    <ellipse cx="100" cy="200" rx="75" ry="90" fill="none" stroke="#b45309" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,3"/>
    <ellipse cx="310" cy="125" rx="85" ry="70" fill="none" stroke="#b45309" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,3"/>
    <ellipse cx="500" cy="215" rx="75" ry="85" fill="none" stroke="#b45309" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,3"/>

    <!-- === GRAPH EDGES (non-arbitrage, subtle) === -->
    <!-- Cluster 1 internal edges -->
    <line x1="95" y1="135" x2="148" y2="195" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <line x1="95" y1="135" x2="55" y2="210" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
    <line x1="148" y1="195" x2="55" y2="210" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
    <line x1="55" y1="210" x2="105" y2="280" stroke="#94a3b8" stroke-width="1" opacity="0.35"/>
    <line x1="148" y1="195" x2="105" y2="280" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>

    <!-- Cluster 2 internal edges -->
    <line x1="280" y1="85" x2="340" y2="140" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <line x1="340" y1="140" x2="250" y2="170" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
    <line x1="280" y1="85" x2="250" y2="170" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
    <line x1="340" y1="140" x2="380" y2="85" stroke="#94a3b8" stroke-width="1" opacity="0.35"/>

    <!-- Cluster 3 internal edges -->
    <line x1="460" y1="175" x2="520" y2="235" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <line x1="520" y1="235" x2="545" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
    <line x1="460" y1="175" x2="545" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.35"/>
    <line x1="520" y1="235" x2="490" y2="310" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>

    <!-- Cross-cluster edges (very subtle) -->
    <line x1="148" y1="195" x2="250" y2="170" stroke="#cbd5e1" stroke-width="0.7" opacity="0.5" stroke-dasharray="4,4"/>
    <line x1="340" y1="140" x2="460" y2="175" stroke="#cbd5e1" stroke-width="0.7" opacity="0.5" stroke-dasharray="4,4"/>
    <line x1="105" y1="280" x2="310" y2="300" stroke="#cbd5e1" stroke-width="0.7" opacity="0.4" stroke-dasharray="4,4"/>

    <!-- === ARBITRAGE PATH (bold green with arrows) === -->
    <path d="M 102,135 L 272,88" stroke="#16a34a" stroke-width="3.5" fill="none" opacity="0.9" marker-end="url(#arrowGreen)"/>
    <path d="M 288,88 L 452,172" stroke="#16a34a" stroke-width="3.5" fill="none" opacity="0.9" marker-end="url(#arrowGreen)"/>
    <path d="M 456,182 Q 300,330 102,142" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.55" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>

    <!-- Edge weight labels on arbitrage path -->
    <rect x="168" y="93" width="40" height="18" rx="3" fill="#ffffff" stroke="#16a34a" stroke-width="0.8" opacity="0.95"/>
    <text x="188" y="106" fill="#16a34a" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">0.42</text>

    <rect x="368" y="113" width="40" height="18" rx="3" fill="#ffffff" stroke="#16a34a" stroke-width="0.8" opacity="0.95"/>
    <text x="388" y="126" fill="#16a34a" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">0.31</text>

    <rect x="246" y="258" width="40" height="18" rx="3" fill="#ffffff" stroke="#16a34a" stroke-width="0.8" opacity="0.95"/>
    <text x="266" y="271" fill="#16a34a" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">0.27</text>

    <!-- === GRAPH NODES === -->
    <!-- Cluster 1 (Markets cluster) -->
    <circle cx="95" cy="135" r="26" fill="url(#arbNodeGlow)"/>
    <circle cx="95" cy="135" r="10" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
    <circle cx="95" cy="135" r="4" fill="#16a34a"/>

    <circle cx="148" cy="195" r="16" fill="url(#nodeGlow)"/>
    <circle cx="148" cy="195" r="6" fill="#ffffff" stroke="#b45309" stroke-width="1.5"/>
    <circle cx="148" cy="195" r="2.5" fill="#b45309"/>

    <circle cx="55" cy="210" r="14" fill="url(#nodeGlow)"/>
    <circle cx="55" cy="210" r="5" fill="#ffffff" stroke="#b45309" stroke-width="1.2"/>
    <circle cx="55" cy="210" r="2" fill="#b45309"/>

    <circle cx="105" cy="280" r="14" fill="url(#nodeGlow)"/>
    <circle cx="105" cy="280" r="5" fill="#ffffff" stroke="#b45309" stroke-width="1.2"/>
    <circle cx="105" cy="280" r="2" fill="#b45309"/>

    <!-- Cluster 2 (Analysis cluster) -->
    <circle cx="280" cy="85" r="26" fill="url(#arbNodeGlow)"/>
    <circle cx="280" cy="85" r="10" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
    <circle cx="280" cy="85" r="4" fill="#16a34a"/>

    <circle cx="340" cy="140" r="16" fill="url(#nodeGlow)"/>
    <circle cx="340" cy="140" r="6" fill="#ffffff" stroke="#b45309" stroke-width="1.5"/>
    <circle cx="340" cy="140" r="2.5" fill="#b45309"/>

    <circle cx="250" cy="170" r="14" fill="url(#nodeGlow)"/>
    <circle cx="250" cy="170" r="5" fill="#ffffff" stroke="#b45309" stroke-width="1.2"/>
    <circle cx="250" cy="170" r="2" fill="#b45309"/>

    <circle cx="380" cy="85" r="12" fill="url(#nodeGlow)"/>
    <circle cx="380" cy="85" r="4.5" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <circle cx="380" cy="85" r="1.8" fill="#b45309"/>

    <!-- Cluster 3 (Execution cluster) -->
    <circle cx="460" cy="175" r="26" fill="url(#arbNodeGlow)"/>
    <circle cx="460" cy="175" r="10" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
    <circle cx="460" cy="175" r="4" fill="#16a34a"/>

    <circle cx="520" cy="235" r="16" fill="url(#nodeGlow)"/>
    <circle cx="520" cy="235" r="6" fill="#ffffff" stroke="#b45309" stroke-width="1.5"/>
    <circle cx="520" cy="235" r="2.5" fill="#b45309"/>

    <circle cx="545" cy="155" r="12" fill="url(#nodeGlow)"/>
    <circle cx="545" cy="155" r="4.5" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <circle cx="545" cy="155" r="1.8" fill="#b45309"/>

    <circle cx="490" cy="310" r="14" fill="url(#nodeGlow)"/>
    <circle cx="490" cy="310" r="5" fill="#ffffff" stroke="#b45309" stroke-width="1.2"/>
    <circle cx="490" cy="310" r="2" fill="#b45309"/>

    <!-- Additional scattered nodes for depth -->
    <circle cx="310" cy="300" r="12" fill="url(#nodeGlow)"/>
    <circle cx="310" cy="300" r="4.5" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <circle cx="310" cy="300" r="1.8" fill="#b45309"/>

    <circle cx="200" cy="310" r="10" fill="url(#nodeGlow)"/>
    <circle cx="200" cy="310" r="4" fill="#ffffff" stroke="#b45309" stroke-width="0.8" opacity="0.6"/>
    <circle cx="200" cy="310" r="1.5" fill="#b45309" opacity="0.6"/>

    <circle cx="420" cy="290" r="10" fill="url(#nodeGlow)"/>
    <circle cx="420" cy="290" r="4" fill="#ffffff" stroke="#b45309" stroke-width="0.8" opacity="0.6"/>
    <circle cx="420" cy="290" r="1.5" fill="#b45309" opacity="0.6"/>

    <!-- === PROBABILITY LABELS on arb nodes === -->
    <text x="95" y="115" fill="#475569" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">P=0.68</text>
    <text x="280" y="65" fill="#475569" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">P=0.45</text>
    <text x="460" y="155" fill="#475569" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">P=0.87</text>

  </g>
</svg>